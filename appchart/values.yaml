replicaCount: 1

image:
  repository: cley44/kubequest
  tag: "1.2"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

envSecretName: app-env-secret
#TEMPORARY
secret:
  enabled: true
  name: app-env-secret
  data:
    DB_HOST: mysql-db.default.svc.cluster.local
    DB_DATABASE: kubequest
    DB_USERNAME: root
    DB_PASSWORD: kubequest
    APP_KEY: qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq
    APP_DEBUG: "true"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
